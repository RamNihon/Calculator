<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="calculator.css">
</head>
<body>
   
    <h1 behavior="alternate">Calculator</h1>
  <div class="main">
        
       <div class="display">
           <div class="calculate">0</div>
           <div id="result"  class=" hidden"></div>
       </div>
       
                     <div class="btn-box">
    <div class="buttons">
           <button value="AC">AC</button>
          <button value="~">⌫</button>
          <button value="%">％</button>
         <button value="1">1</button>
         <button value="2">2</button>
         <button value="3">3</button>
          <button value="4">4</button>
         <button  value="5">5</button>
         <button  value="6">6</button>
         <button  value="7">7</button>
        <button  value="8">8</button>
          <button  value="9">9</button>
          <button style="color:blue; font-size:30px; ;"id="web">֎</button>
        <button  value="0">0</button>  
        <button  value=".">.</button>        
    </div>
       
           <div class="sign">
             <button  value="/">➗</button>
             <button  value="*">✖️</button>
             <button  value="-">➖</button>
             <button  value="+">➕</button>
             <button id="equal"  value="=">🟰</button>
           </div>
                            </div>
  </div>
    
  <!--  <button class="glass-card"> </button> -->
    

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/14.8.1/math.min.js" defer></script>
    <script src="calculator.js"></script>
</body>
</html>
